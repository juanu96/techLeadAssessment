name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  products-api:
    name: Products API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: products-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: products-api/go.mod
          cache-dependency-path: products-api/go.mod

      - name: Run tests
        run: go test ./...

  clients-api:
    name: Clients API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: clients-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clients-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Run e2e tests
        run: npm run test:e2e

  order-worker:
    name: Order Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: order-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run unit tests and coverage
        run: ./mvnw -B verify
