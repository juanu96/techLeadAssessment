services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "30"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "cub", "kafka-ready", "-b", "localhost:29092", "1", "30"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      ORDERS_TOPIC: ${KAFKA_ORDERS_TOPIC:-orders-topic}
      DLT_TOPIC: ${KAFKA_DLT_TOPIC:-orders-dlt}
      ORDERS_PARTITIONS: ${KAFKA_ORDERS_PARTITIONS:-3}
      DLT_PARTITIONS: ${KAFKA_DLT_PARTITIONS:-1}
    command:
      - /bin/bash
      - -c
      - |
        set -e
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic "$${ORDERS_TOPIC}" --partitions "$${ORDERS_PARTITIONS}" --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic "$${DLT_TOPIC}" --partitions "$${DLT_PARTITIONS}" --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --list
    restart: "no"

  mongodb:
    image: mongo:7.0.14
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: orders
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - mongodb-data:/data/db

  redis:
    image: redis:7.4.1-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - redis-data:/data

  products-api:
    build:
      context: ./products-api
    ports:
      - "${PRODUCTS_API_PORT:-8081}:8081"
    environment:
      PRODUCTS_API_PORT: 8081
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  clients-api:
    build:
      context: ./clients-api
    ports:
      - "${CLIENTS_API_PORT:-8082}:8082"
    environment:
      CLIENTS_API_PORT: 8082
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  order-worker:
    build:
      context: ./order-worker
    ports:
      - "${ORDER_WORKER_PORT:-8080}:8080"
    environment:
      ORDER_WORKER_PORT: 8080
      ORDER_CURRENCY: ${ORDER_CURRENCY:-COP}
      PRODUCTS_API_URL: http://products-api:8081
      CLIENTS_API_URL: http://clients-api:8082
      MONGODB_URI: mongodb://mongodb:27017/orders
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-order-worker}
      KAFKA_ORDERS_TOPIC: ${KAFKA_ORDERS_TOPIC:-orders-topic}
      KAFKA_DLT_TOPIC: ${KAFKA_DLT_TOPIC:-orders-dlt}
      KAFKA_PROCESSING_MAX_ATTEMPTS: ${KAFKA_PROCESSING_MAX_ATTEMPTS:-3}
      KAFKA_PROCESSING_RETRY_DELAY: ${KAFKA_PROCESSING_RETRY_DELAY:-500ms}
      PRODUCT_CACHE_TTL: ${PRODUCT_CACHE_TTL:-300s}
      CLIENT_CACHE_TTL: ${CLIENT_CACHE_TTL:-300s}
      API_RETRY_MAX_ATTEMPTS: ${API_RETRY_MAX_ATTEMPTS:-3}
      API_RETRY_WAIT: ${API_RETRY_WAIT:-200ms}
      API_RESPONSE_TIMEOUT: ${API_RESPONSE_TIMEOUT:-3s}
      API_CIRCUIT_BREAKER_FAILURE_RATE: ${API_CIRCUIT_BREAKER_FAILURE_RATE:-50}
      API_CIRCUIT_BREAKER_WINDOW_SIZE: ${API_CIRCUIT_BREAKER_WINDOW_SIZE:-10}
      API_CIRCUIT_BREAKER_OPEN_DURATION: ${API_CIRCUIT_BREAKER_OPEN_DURATION:-30s}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      products-api:
        condition: service_healthy
      clients-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  zookeeper-data:
  zookeeper-logs:
  mongodb-data:
  redis-data:
