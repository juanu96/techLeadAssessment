spring:
  application:
    name: order-worker
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb:27017/orders}
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

worker:
  currency: ${ORDER_CURRENCY:COP}
  services:
    products-url: ${PRODUCTS_API_URL}
    clients-url: ${CLIENTS_API_URL}
    response-timeout: ${API_RESPONSE_TIMEOUT:3s}
  cache:
    product-ttl: ${PRODUCT_CACHE_TTL:300s}
    client-ttl: ${CLIENT_CACHE_TTL:300s}
  resilience:
    max-attempts: ${API_RETRY_MAX_ATTEMPTS:3}
    wait-duration: ${API_RETRY_WAIT:200ms}
    failure-rate-threshold: ${API_CIRCUIT_BREAKER_FAILURE_RATE:50}
    sliding-window-size: ${API_CIRCUIT_BREAKER_WINDOW_SIZE:10}
    open-state-duration: ${API_CIRCUIT_BREAKER_OPEN_DURATION:30s}
  kafka:
    enabled: ${KAFKA_CONSUMER_ENABLED:true}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    group-id: ${KAFKA_CONSUMER_GROUP:order-worker}
    orders-topic: ${KAFKA_ORDERS_TOPIC:orders-topic}
    dlt-topic: ${KAFKA_DLT_TOPIC:orders-dlt}
    processing-max-attempts: ${KAFKA_PROCESSING_MAX_ATTEMPTS:3}
    retry-delay: ${KAFKA_PROCESSING_RETRY_DELAY:500ms}

server:
  port: ${ORDER_WORKER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
